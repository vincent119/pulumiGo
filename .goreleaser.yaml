# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
      - windows
      - darwin

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

brews:
  - name: pulumiGo
    repository:
      owner: vincent119
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/vincent119/pulumiGo"
    description: "pulumiGo CLI tool"
    install: |
      bin.install "pulumiGo"
    test: |
      system "#{bin}/pulumiGo", "--version"

changelog:
  use: github
  sort: desc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  header: |
    ## What's Changed / 本版本變更

    ### Refactor / 重構
    - Decoupled WAF regex logic from `LoadYaml` — loader is now a pure I/O function
      將 WAF 正規表達式邏輯從 `LoadYaml` 分離，載入器現為純 I/O 函式
    - Unified flag-forwarding helpers across all handlers (`refresh`, `import`, `state`, `config`, `login`)
      所有 handler 統一改用旗標轉發 helper
    - Removed per-command flag handling from `executor.go`
      移除 `executor.go` 中的命令特殊旗標判斷
    - Replaced `init()` panic with `sync.Once` lazy initialization for `workDir`
      `workDir` 改用 `sync.Once` lazy 初始化，失敗時回傳 error 而非 panic
    - Replaced `log` with `zlogger` in executor for consistent logging
      `executor.go` 日誌統一改用 zlogger
    - Removed redundant `max`/`min` functions (Go 1.21+ built-ins)
      移除自訂 `max`/`min`，直接使用 Go 1.21+ 內建版本
    - Injected version via `ldflags` at build time
      改由 goreleaser `ldflags` 在 build 時注入版本號

    ### Tests / 測試
    - Added unit tests for `iac`, `command/handlers`, `command` packages
      新增 `iac`、`command/handlers`、`command` package 單元測試
    - Added `cover` target to Makefile for coverage reports
      Makefile 新增 `cover` 目標產生覆蓋率報告

  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
